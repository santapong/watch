# Default configuration for object detection

# Model settings
model:
  backend: ""                  # "" = infer from name; or "yolo" (v8/v10/v11/26) | "rtdetr"
  name: "yolov8n.pt"          # Model file: yolov8n/s/m/l/x.pt, yolo11n.pt, rtdetr-l.pt, etc.
  confidence: 0.25             # Minimum confidence threshold
  iou_threshold: 0.45          # NMS IoU threshold
  device: ""                   # Auto-detect: "", "cpu", "cuda:0", "mps"
  classes: null                # Filter classes (null = all, [0] = person only, [0, 2] = person + car)
  tiled: false                 # SAHI-style sliced inference for small/distant objects (slower)
  tile_size: 640               # Tile size (px) when tiled
  tile_overlap: 0.2            # Fractional overlap between tiles (0-1)

# Video source
source:
  type: "webcam"               # "webcam", "url", "file"
  webcam_index: 0              # Camera index for webcam
  url: ""                      # URL for IP camera (e.g., "http://192.168.1.10:8080/video")
  file_path: ""                # Path to video file
  resolution: null             # null = default, or [1280, 720]

# Display settings
display:
  show_confidence: true
  show_track_id: true
  show_fps: true
  show_model_info: true
  window_name: "Object Detection"
  bbox_thickness: 2
  font_scale: 0.6

# Tracking
tracking:
  enabled: false               # Set to true to enable object tracking
  max_history: 50              # Max trajectory trail points per track
  reid_threshold: 0.7          # Re-ID cosine similarity threshold
  reid_backend: "auto"         # Embedder: "auto" (OSNet if torch+torchreid, else histogram) | "histogram" | "osnet"
  lost_timeout: 5.0            # Seconds a vanished track stays re-identifiable

# Zone counting
zones:
  enabled: false
  polygons: []                 # List of {name, points, color} zone definitions
  # Example:
  # polygons:
  #   - name: "Entrance"
  #     points: [[100, 100], [400, 100], [400, 500], [100, 500]]
  #     color: [0, 255, 0]

# Open-vocabulary detection
open_vocab:
  model: "google/owlv2-base-patch16-ensemble"
  queries: ["person", "car", "dog"]
  confidence: 0.1

# Anomaly detection
anomaly:
  enabled: false
  learning_frames: 500         # Frames to learn normal patterns
  contamination: 0.05          # Expected anomaly proportion

# Action recognition
action:
  model: "yolov8n-pose.pt"
  sequence_length: 15          # Frames for temporal action analysis
  fall:                        # Multi-cue, debounced fall detection
    angle_deg: 45              # Torso angle from horizontal below which it counts as "down"
    velocity: 8                # Downward shoulder velocity (px/frame) corroborating a fall
    debounce: 3                # Consecutive fall-like frames before reporting a fall
    alert_cooldown: 10         # Seconds between repeated fall alerts

# Monocular depth (Phase 2; needs onnxruntime + an ONNX model, see requirements-phase2.txt)
depth:
  enabled: false
  backend: "depth_anything"    # "depth_anything" (relative) | "depth_anything_metric" (meters) | "midas"
  model_path: ""               # path to the ONNX depth model (Depth Anything V2 / MiDaS)
  input_size: [518, 518]       # model input (w, h); smaller = faster on edge (e.g. [384,384], [256,256])
  proximity_threshold: 0.8     # relative backends: normalized depth (0-1, larger = nearer) above which to alert
  proximity_threshold_m: 2.0   # metric backend only: distance in meters (smaller = nearer) below which to alert
  alert_cooldown: 10           # seconds between proximity alerts

# Multi-camera
multicam:
  cell_size: [640, 480]        # Grid cell size (width, height)
  max_match_distance: 2.0      # Max BEV distance (ground units) to match across cameras
  cameras: []                  # List of {name, source, [homography]} camera definitions
  # Example (homography maps image pixels -> a shared ground plane; >=4 point pairs):
  # cameras:
  #   - name: "Camera 0"
  #     source: 0
  #     homography:
  #       image_points:  [[100, 700], [1180, 700], [1180, 300], [100, 300]]
  #       ground_points: [[0, 0], [5, 0], [5, 8], [0, 8]]
  #   - name: "Stream 1"
  #     source: "http://192.168.1.105:8080/video"

# Temporal event detection
temporal:
  enabled: false
  loiter_seconds: 30           # Seconds before flagging loitering
  abandoned_seconds: 60        # Seconds before flagging abandoned object
  crowd_threshold: 10          # Person count for crowd alert

# Active learning
active_learning:
  max_samples: 500
  sampling_interval: 30        # Min frames between samples
  confidence_range: [0.2, 0.6] # Uncertainty range

# Heatmap generation
heatmap:
  enabled: false
  decay: 0.995                 # Exponential decay per frame (0-1)
  radius: 40                   # Gaussian blob radius in pixels
  alpha: 0.5                   # Overlay transparency
  class_filter: null            # null = all classes, or ["person", "car"]
  save_interval: 0             # Auto-save every N frames (0 = disabled)

# Privacy mode
privacy:
  enabled: false
  mode: "blur"                 # "blur", "pixelate", "blackout"
  target: "person"             # "person", "face", "all"
  blur_strength: 51            # Gaussian blur kernel size (odd number)
  pixel_size: 15               # Mosaic block size for pixelation

# Alert system
alerts:
  enabled: false
  log_path: "alerts.json"      # Local alert log file
  webhook_url: ""              # Slack/Discord/custom webhook URL
  email:
    enabled: false
    smtp_host: ""
    smtp_port: 587
    sender: ""
    recipients: []
    username: ""
    password: ""

# Workstation activity monitoring (Phase A scaffold)
workstation:
  enabled: false
  db_path: "data/activity.db"  # SQLite store for stations/employees/shifts/events
  hysteresis_seconds: 2.0      # Debounce window before committing a state change
  idle_timeout_seconds: 10.0   # No observation for this long -> auto IDLE
  stations:
    # - name: "Station 1"
    #   camera_index: 0
    #   location: "Workshop floor"
  employees:
    # - name: "Employee 1"
    #   badge_id: "EMP001"
    #   consent: false
  assignments:
    # station_name -> employee badge_id
    # "Station 1": "EMP001"
